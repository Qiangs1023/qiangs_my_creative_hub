<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = "/qiangs_my_creative_hub" + location.pathname;
    if (location.search) path += location.search;
    if (location.hash) path += location.hash;
    location.replace(path + "/");
  </script>
</head>
<body>
  <p>Redirecting to <a id="link"></a>...</p>
  <script>
    var path = "/qiangs_my_creative_hub" + location.pathname;
    if (location.search) path += location.search;
    if (location.hash) path += location.hash;
    document.getElementById("link").href = path + "/";
    document.getElementById("link").innerText = location.origin + path + "/";
    location.replace(path + "/");
  </script>
</body>
</html>
